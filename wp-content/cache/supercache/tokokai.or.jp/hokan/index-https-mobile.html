  position:absolute; width:60px; z-index:10;
  left:50%; top:50%; -webkit-transform: translate(-50%, -50%); transform: translate(-50%, -50%);
}
.circular_loader:before { content:''; display:block; padding-top:100%; }
.circular_loader .circular {
  width:100%; height:100%;
  -webkit-animation: circular_loader_rotate 2s linear infinite; animation: circular_loader_rotate 2s linear infinite;
  -webkit-transform-origin: center center; -ms-transform-origin: center center; transform-origin: center center;
  position: absolute; top:0; bottom:0; left:0; right:0; margin:auto;
}

  stroke-dashoffset: 0;
  stroke-linecap: round;
  stroke: #000000;

}

  100% { -webkit-transform: rotate(360deg); transform: rotate(360deg); }
}

  100% { -webkit-transform: rotate(360deg); transform: rotate(360deg); }
}
@-webkit-keyframes circular_loader_dash {
  0% { stroke-dasharray: 1, 200; stroke-dashoffset: 0; }

	var $window = $(window);
	var $body = $('body');
	  // quick tag - underline ------------------------------------------
		if ($('.q_underline').length) {
    var gradient_prefix = null;

    $('.q_underline').each(function(){
      var bbc = $(this).css('borderBottomColor');
      if (jQuery.inArray(bbc, ['transparent', 'rgba(0, 0, 0, 0)']) == -1) {
        if (gradient_prefix === null) {
          gradient_prefix = '';
          var ua = navigator.userAgent.toLowerCase();
          if (/webkit/.test(ua)) {
            gradient_prefix = '-webkit-';
          } else if (/firefox/.test(ua)) {
            gradient_prefix = '-moz-';
          } else {
            gradient_prefix = '';
          }
        }
        $(this).css('borderBottomColor', 'transparent');
        if (gradient_prefix) {
          $(this).css('backgroundImage', gradient_prefix+'linear-gradient(left, transparent 50%, '+bbc+ ' 50%)');
        } else {
          $(this).css('backgroundImage', 'linear-gradient(to right, transparent 50%, '+bbc+ ' 50%)');
        }
      }
    });

    $window.on('scroll.q_underline', function(){
      $('.q_underline:not(.is-active)').each(function(){
        if ($body.hasClass('show-serumtal')) {
          var left = $(this).offset().left;
          if (window.scrollX > left - window.innerHeight) {
            $(this).addClass('is-active');
          }
        } else {
          var top = $(this).offset().top;
          if (window.scrollY > top - window.innerHeight) {
            $(this).addClass('is-active');
          }
        }
      });
      if (!$('.q_underline:not(.is-active)').length) {
        $window.off('scroll.q_underline');
      }
    });
  }
} );

<script>

  if (event.originalEvent.persisted) {
    window.location.reload()

function after_load() {
  (function($) {

  $('body').addClass('end_loading');

  
  var slideWrapper = $('#header_slider'),
      iframes = slideWrapper.find('.youtube-player'),
      ytPlayers = {},
      timers = { slickNext: null };

  // YouTube IFrame Player API script load
  if ($('#header_slider .youtube-player').length) {
    if (!$('script[src="//www.youtube.com/iframe_api"]').length) {
      var tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      var firstScriptTag = document.getElementsByTagName('script')[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
    }
  }

  // YouTube IFrame Player API Ready
  window.onYouTubeIframeAPIReady = function(){
    slideWrapper.find('.youtube-player').each(function(){
      var ytPlayerId = $(this).attr('id');
      if (!ytPlayerId) return;
      var player = new YT.Player(ytPlayerId, {
        events: {
          onReady: function(e) {
            $('#'+ytPlayerId).css('opacity', 0).css('pointerEvents', 'none');
            iframes = slideWrapper.find('.youtube-player');
            ytPlayers[ytPlayerId] = player;
            ytPlayers[ytPlayerId].mute();
            ytPlayers[ytPlayerId].lastStatus = -1;
            var item = $('#'+ytPlayerId).closest('.item');
            if (item.hasClass('slick-current')) {
              playPauseVideo(item, 'play');
            }
          },
          onStateChange: function(e) {
            if (e.data === 0) { // ended
              if (slideWrapper.find('.item').length == 1) {                var slide = slideWrapper.find('.slick-current');
                slide.css('transition', 'none').removeClass('animate');
                slide.find('.animate_item').css('transition', 'none').removeClass('animate');
                setTimeout(function(){
                  slide.removeAttr('style');
                  slide.find('.animate_item').removeAttr('style');
                  slide.addClass('animate');
                  playPauseVideo(slide, 'play');
                }, 20);
              } else {
                $('#'+ytPlayerId).stop().css('opacity', 0);
                if ($('#'+ytPlayerId).closest('.item').hasClass('slick-current')) {
                  if (timers.slickNext) {
                    clearTimeout(timers.slickNext);
                    timers.slickNext = null;
                  }
                  slideWrapper.slick('slickNext');
                }
              }
            } else if (e.data === 1) { // play
              $('#'+ytPlayerId).not(':animated').css('opacity', 1);
              if (slideWrapper.find('.item').length > 1) {
                var slide = $('#'+ytPlayerId).closest('.item');
                var slickIndex = slide.attr('data-slick-index') || 0;
                clearInterval(timers[slickIndex]);
                timers[slickIndex] = setInterval(function(){
                  var state = ytPlayers[ytPlayerId].getPlayerState();
                  if (state != 1 && state != 3) {
                    clearInterval(timers[slickIndex]);
                  } else if (ytPlayers[ytPlayerId].getDuration() - ytPlayers[ytPlayerId].getCurrentTime() < 1) {
                    clearInterval(timers[slickIndex]);
                    if (timers.slickNext) {
                      clearTimeout(timers.slickNext);
                      timers.slickNext = null;
                    }
                    slideWrapper.slick('slickNext');
                  }
                }, 200);
              }
            } else if (e.data === 3) { // buffering
              if (ytPlayers[ytPlayerId].lastStatus === -1) {
                $('#'+ytPlayerId).delay(100).animate({opacity: 1}, 400);
              }
            }
            ytPlayers[ytPlayerId].lastStatus = e.data;
          }
        }
      });
    });
  };

  // play or puase video
  function playPauseVideo(slide, control){
    if (!slide) {
      slide = slideWrapper.find('.slick-current');
    }
    // animate caption and logo
    function captionAnimation() {
      slide.find(".catch span").each(function(i){
        const $el = $(this);
        $el.removeClass('animate');
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            $el.delay(i * 400).queue(function(next) {
              $el.addClass('animate');
              next();
            });
          });
        });
      });
    }
    // youtube item --------------------------
    if (slide.hasClass('youtube')) {
      var ytPlayerId = slide.find('.youtube-player').attr('id');
      if (ytPlayerId) {
        switch (control) {
          case 'play':
            if (ytPlayers[ytPlayerId]) {
              ytPlayers[ytPlayerId].seekTo(0, true);
            }
            // breakしない
          case 'resume':
            if (ytPlayers[ytPlayerId]) {
              ytPlayers[ytPlayerId].playVideo();
            }
            if( slide.hasClass('first_item') ){
              setTimeout(function(){
                captionAnimation();
              }, 1000);
            } else {
              setTimeout(function(){
                captionAnimation();
              }, 600);
            }
            if (timers.slickNext) {
              clearTimeout(timers.slickNext);
              timers.slickNext = null;
            }
            break;
          case 'pause':
            slide.find(".catch span").removeClass('animate');
            if (ytPlayers[ytPlayerId]) {
              ytPlayers[ytPlayerId].pauseVideo();
            }
            if(slide.hasClass('first_item')){
              setTimeout(function(){
                slide.removeClass('first_item');
              }, 1000);
            }
            break;
        }
      }
    // video item ------------------------
    } else if (slide.hasClass('video')) {
      var video = slide.find('video').get(0);
      if (video) {
        switch (control) {
          case 'play':
            video.currentTime = 0;
            // breakしない
          case 'resume':
            video.play();
            if( slide.hasClass('first_item') ){
              setTimeout(function(){
                captionAnimation();
              }, 1000);
            } else {
              setTimeout(function(){
                captionAnimation();
              }, 600);
            }
            var slickIndex = slide.attr('data-slick-index') || 0;
            clearInterval(timers[slickIndex]);
            timers[slickIndex] = setInterval(function(){
              if (video.paused) {
                // clearInterval(timers[slickIndex]);
              } else if (video.duration - video.currentTime < 2) {
                clearInterval(timers[slickIndex]);
                if (timers.slickNext) {
                  clearTimeout(timers.slickNext);
                  timers.slickNext = null;
                }
                slideWrapper.slick('slickNext');
                setTimeout(function(){
                  video.currentTime = 0;
                }, 2000);
              }
            }, 200);
            break;
          case 'pause':
            slide.find(".catch span").removeClass('animate');
            video.pause();
            if(slide.hasClass('first_item')){
              setTimeout(function(){
                slide.removeClass('first_item');
              }, 1000);
            }
            break;
        }
      }
    // normal image item --------------------
    } else if (slide.hasClass('image_item')) {
      switch (control) {
        case 'play':
        case 'resume':
          if( slide.hasClass('first_item') ){
            setTimeout(function(){
              captionAnimation();
            }, 1000);
          } else {
            setTimeout(function(){
              captionAnimation();
            }, 600);
          }
          if (timers.slickNext) {
            clearTimeout(timers.slickNext);
            timers.slickNext = null;
          }
          timers.slickNext = setTimeout(function(){
            slideWrapper.slick('slickNext');
          }, 4000);
          break;
        case 'pause':
          slide.find(".catch span").removeClass('animate');
          if(slide.hasClass('first_item')){
            setTimeout(function(){
              slide.removeClass('first_item');
            }, 1000);
          }
          break;
      }
    }
  }


  // resize youtube
  function youtube_resize(){
    var header_slider = $('#header_slider');
    var content_height = header_slider.innerHeight();
    var content_width = header_slider.innerWidth();
    var youtube_height = content_width*(9/16);
    var youtube_width = content_height*(16/9);
    if(content_width > youtube_width) {
      header_slider.find('.youtube_wrap').addClass('type1');
      header_slider.find('.youtube_wrap').removeClass('type2');
      header_slider.find('.youtube_wrap').css({'width': '100%', 'height': youtube_height});
    } else {
      header_slider.find('.youtube_wrap').removeClass('type1');
      header_slider.find('.youtube_wrap').addClass('type2');
      header_slider.find('.youtube_wrap').css({'width':youtube_width, 'height':content_height });
    }
  }


  // Adjust size
  function adjust_size(){
    var winH = $(window).innerHeight();
    $('#header_slider_wrap').css('height', winH);
    $('#header_slider').css('height', winH);
    $('#header_slider .item').css('height', winH);
    $('#header_slider .slick-track').css('height', winH);
  }


  // DOM Ready
  $(function() {
    slideWrapper.on('beforeChange', function(event, slick, currentSlide, nextSlide) {
      if (currentSlide == nextSlide) return;
      slick.$slides.eq(nextSlide).addClass('animate');
      slick.$slides.eq(currentSlide).addClass('end_animate');
      setTimeout(function(){
        playPauseVideo(slick.$slides.eq(currentSlide), 'pause');
      }, slick.options.speed);
      playPauseVideo(slick.$slides.eq(nextSlide), 'play');
    });
    slideWrapper.on('afterChange', function(event, slick, currentSlide) {
      slick.$slides.not(':eq(' + currentSlide + ')').removeClass('animate end_animate');
    });
    slideWrapper.on('swipe', function(event, slick, direction){
      slideWrapper.slick('setPosition');
    });

    //start the slider
    slideWrapper.slick({
      slide: '.item',
      infinite: true,
      dots: true,
      appendDots: $('#header_slider_wrap'),
      arrows: false,
      slidesToShow: 1,
      slidesToScroll: 1,
      swipe: true,
      pauseOnFocus: false,
      pauseOnHover: false,
      autoplay: false,
      fade: true,
      autoplaySpeed:9000,
      speed:1500,
      easing: 'easeOutExpo',
    });

    // initialize / first animate
    //adjust_size();
    youtube_resize();
    playPauseVideo($('#header_slider .item1'), 'play');
    $('#header_slider .first_item').addClass('animate');
    $('#header_logo, #news_ticker, #site_desc, #drawer_menu_button').addClass('animate');
      });

  $(document).on('click', '#header_slider .slick-dots', function(event){
    $(this).addClass('no_click');
    setTimeout(function(){
      $('#header_slider .slick-dots').removeClass('no_click');
    }, 2000);
  });

  // Resize event
  var currentWidth = $(window).innerWidth();
  $(window).on('resize', function(){
    //adjust_size();
    if (currentWidth == $(this).innerWidth()) {
      return;
    } else {
      youtube_resize();
    };
  });

  
  
    
  })( jQuery );
}

jQuery(function($){

  
  $('a:not([href*=#]):not([href^="tel:"]):not([target]):not(.no_move_page)').click(function(){
    var url = $(this).attr('href');
    if(url){
      $('#site_loader_overlay').addClass('move_next_page');
      setTimeout(function(){
        location.href = url;
      }, 300);
    }
    return false;
  });

  if( $('#site_loader_overlay').length ){
    var winH = $(window).innerHeight();
    $('#site_loader_overlay').css('height', winH);
    $('#site_loader_overlay').addClass('animate');
    $(window).on('resize', function(){
      var winH = $(window).innerHeight();
      $('#site_loader_overlay').css('height', winH);
      $('#site_loader_overlay').addClass('animate');
    });
  }

});

(function($) {
  $(window).on('load', function(){
    setTimeout(function(){
      after_load();
    }, '500');
  });
})(jQuery);

</script>
